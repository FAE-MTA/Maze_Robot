body {

}

/* Nút home */
.home {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;

}

  margin: 0;
}

.header p {
  opacity: 0.85;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 10px;
  padding: 20px 30px 30px;
}

/* Card */
.card {
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px;
  text-decoration: none;
  color: white;
  transition: 0.25s;
  border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(0,255,255,0.15);
  box-shadow: 0 0 20px rgba(0,255,255,0.4);
}

.card h2 {
  margin: 10px 0;
  font-size: 18px;
}

.card p {
  font-size: 14px;
  opacity: 0.8;
}

.num {
  font-size: 24px;
  font-weight: bold;
  color: #00ffff;
}
</style>
