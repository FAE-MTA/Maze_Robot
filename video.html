<html lang="vi">
<head>

<title>Video hướng dẫn - Robot mê cung 2026</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#061b45;
  color:white;
}

/* Nút Home */
.home{
  position:fixed;
  top:15px;
  left:15px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:white;
  font-size:22px;
  z-index:10;
  transition:.25s;
}

.home:hover{
  background:rgba(255,255,255,.3);
}

/* Header */
.header{
  text-align:center;
  padding:50px 20px 10px;
}

.header h1{
  margin:0;
  font-size:32px;
}

.header p{
  opacity:.85;
}

/* Nội dung */
.content{
  min-height:60vh;

  display:flex;
  flex-direction:column;

  align-items:center;
  justify-content:flex-start;

  padding:20px;
}

.content h2{
  color:#00ffff;
  margin-bottom:20px;
}

/* Video */
.video-wrapper{
  width:min(1000px,90vw);
  aspect-ratio:16/9;

  margin:20px auto;

  border-radius:18px;
  overflow:hidden;

  box-shadow:
    0 0 30px rgba(0,255,255,.25),
    0 10px 40px rgba(0,0,0,.45);
}

.video-wrapper iframe{
  width:100%;
  height:100%;
  border:none;
}

.content p{
  margin-top:20px;
  opacity:.85;
  text-align:center;
}

@media(max-width:768px){

  .header{
    padding-top:70px;
  }

  .header h1{
    font-size:28px;
  }

  .content{
    padding:15px;
  }

  .video-wrapper{
    width:95vw;
  }

}
</style>
</head>

<body>

<a href="index_2.html" class="home">🏠</a>

</div>

<div class="content">
